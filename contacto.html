<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionalo - Contacto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/contacto.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16x16.png?v=2">
</head>
<body>
    <!-- Menú de Navegación-->
    <header class="main-header">
        <div class="header-inner">
            <div class="logo">
                <a href="dashboard.html"><img src="img/gestionalo.png" alt="Logo Gestionalo"></a>
            </div>

            <nav class="main-nav">
                <ul>
                    <li class="nav-item"><a href="dashboard.html">Inicio</a></li>
                    <li class="nav-item"><a href="#">Gestión finanzas</a></li>
                    <li class="nav-item"><a href="herramientas.html">Herramientas</a></li>
                    <li class="nav-item"><a href="#">Agente IA</a></li>
                    <li class="nav-item nav-item--active"><a href="contacto.html">Contacto</a></li>
                    <li class="nav-item"><a href="#">Perfil</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <!-- Fin de Menú de Navegación-->

    <!-- Formulario de contacto-->
    <main class="dashboard contact-page">
        <section class="section-card">
            <h2>Contacto</h2>
            <p>
                Si tienes alguna duda, incidencia o sugerencia sobre Gestionalo, puedes escribirnos
                a través de este formulario. Te responderemos lo antes posible.
            </p>

            <form class="contact-form" action="#" method="post" novalidate>
                <div class="form-grid">
                    <!-- Columna izquierda -->
                    <div class="form-column">
                        <div class="form-group">
                            <label for="nombre">Nombre y apellidos</label>
                            <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre completo">
                        </div>

                        <div class="form-group">
                            <label for="email">Correo electrónico</label>
                            <input type="email" id="email" name="email" required placeholder="tucorreo@ejemplo.com">
                        </div>

                        <div class="form-group">
                            <label for="motivo">Motivo de la consulta</label>
                            <select id="motivo" name="motivo" required>
                                <option value="">-- Selecciona una opción --</option>
                                <option value="duda">Duda sobre el funcionamiento</option>
                                <option value="error">He encontrado un error</option>
                                <option value="sugerencia">Sugerencia de mejora</option>
                                <option value="otro">Otro motivo</option>
                            </select>
                        </div>
                    </div>

                    <!-- Columna derecha -->
                    <div class="form-column">
                        <div class="form-group">
                            <label for="telefono">Teléfono (opcional)</label>
                            <input type="tel" id="telefono" name="telefono" placeholder="+34 600 000 000">
                        </div>

                        <div class="form-group">
                            <label for="asunto">Asunto</label>
                            <input type="text" id="asunto" name="asunto" required placeholder="Resumen breve de tu consulta">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="5" required placeholder="Describe aquí tu consulta con el máximo detalle posible"></textarea>
                </div>

                <div class="form-footer">
                    <label class="checkbox-group">
                        <input type="checkbox" id="privacidad" name="privacidad" required>
                        <span>Acepto la política de privacidad y el tratamiento de mis datos.</span>
                    </label>

                    <button type="submit" class="btn btn-primary">
                        Enviar mensaje
                    </button>
                </div>
            </form>
        </section>
    </main>
    <!-- Fin de Formulario de contacto-->

    <!-- Footer-->
    <footer class="main-footer">
        <div class="footer-inner">
            <p>&copy; 2025 Gestionalo. Todos los derechos reservados.</p>
        </div>
    </footer>
    <!-- Fin de Footer-->
</body>
</html>
